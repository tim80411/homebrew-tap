name: Update TunnelBox Cask

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'TunnelBox version (e.g., v1.3.5 or 1.3.5)'
        required: true
        type: string
  repository_dispatch:
    types: [update-tunnelbox]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          set -e
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          if [ -z "$VERSION" ]; then
            echo "Error: version is empty"
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Processing TunnelBox v${VERSION}"

      - name: Download DMG and compute sha256
        id: sha
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/tim80411/tunnelbox/releases/download/v${VERSION}/TunnelBox-${VERSION}-mac-universal.dmg"
          echo "Downloading ${URL}"
          curl -fL -o tunnelbox.dmg "$URL"
          SHA=$(sha256sum tunnelbox.dmg | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Update cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -e
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/tunnelbox.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/tunnelbox.rb
          echo "--- Updated cask ---"
          cat Casks/tunnelbox.rb

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tunnelbox.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tunnelbox cask to v${{ steps.version.outputs.version }}"
            git push
          fi
